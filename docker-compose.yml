services:
  db:
    image: postgres:16-alpine
    container_name: atalaya-db
    environment:
      POSTGRES_DB: atalaya
      POSTGRES_USER: atalaya
      POSTGRES_PASSWORD: atalaya
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atalaya"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: atalaya-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/atalaya
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata: