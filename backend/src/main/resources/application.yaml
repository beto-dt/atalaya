spring:
  application:
    name: atalaya
  datasource:
    url: jdbc:postgresql://localhost:5432/atalaya
    username: atalaya
    password: atalaya
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

atalaya:
  jwt:
    secret: ${ATALAYA_JWT_SECRET:dev-only-secret-change-in-prod-0123456789abcdef}
  seed-user:
    email: ${ATALAYA_USER_EMAIL:}
    password: ${ATALAYA_USER_PASSWORD:}
